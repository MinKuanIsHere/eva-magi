apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: magi-web
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - magi.example.com
      secretName: magi-web-tls
  rules:
    - host: magi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: magi-web
                port:
                  number: 80
