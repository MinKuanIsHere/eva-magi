apiVersion: apps/v1
kind: Deployment
metadata:
  name: magi-web
  labels:
    app: magi-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: magi-web
  template:
    metadata:
      labels:
        app: magi-web
    spec:
      containers:
        - name: magi-web
          image: ghcr.io/your-org/magi-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
